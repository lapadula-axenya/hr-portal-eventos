name: Terraform

on:
  push:
    branches:
      - feature/**

jobs:
  Checkout:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Clean Install
        id: ci
        run: npm ci

      - name: Format Check
        run: npm run format:check

      - name: Type Check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Build
        id: build
        run: npm run build --if-present
